name: Build Orange Code Desktop

on:
  push:
    tags:
      - 'v*' # 当推送 v 开头的 tag 时触发，如 v0.1.0
  workflow_dispatch: # 也可以手动触发

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config libssl-dev libudev-dev

      - name: Build Rust Backend (Orange CLI)
        run: cargo build --release -p orange-cli
        working-directory: ./rust

      - name: Verify Rust binary exists (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: ls -lh rust/target/release/orange

      - name: Verify Rust binary exists (Windows)
        if: matrix.os == 'windows-latest'
        run: dir rust\target\release\orange.exe

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./client

      - name: Build frontend and Electron
        run: npm run build
        working-directory: ./client

      - name: Package Electron app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run pack
        working-directory: ./client

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: orange-code-desktop-${{ matrix.os }}
          path: |
            client/release/
            rust/target/release/orange*
          retention-days: 30
