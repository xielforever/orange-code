name: 构建并发布桌面应用

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  APP_NAME: Orange

jobs:
  build:
    name: 构建 ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable

      - name: 安装 Linux 系统依赖
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libssl-dev \
            libudev-dev \
            pkg-config

      - name: 构建 Rust 后端
        working-directory: rust
        run: cargo build --release

      - name: 安装前端依赖
        working-directory: client
        run: npm ci

      - name: 同步版本号（来自 tag）
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        working-directory: client
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version

      - name: 构建前端
        working-directory: client
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 打包 Electron（macOS）
        if: matrix.os == 'macos-latest'
        working-directory: client
        run: npx electron-builder --mac --publish never

      - name: 打包 Electron（Windows）
        if: matrix.os == 'windows-latest'
        working-directory: client
        run: npx electron-builder --win --publish never

      - name: 打包 Electron（Linux）
        if: matrix.os == 'ubuntu-latest'
        working-directory: client
        run: npx electron-builder --linux --publish never

      - name: 规整产物命名（防止 Release 冲突）
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OS="${{ matrix.os }}"
          APP_NAME="${{ env.APP_NAME }}"
          mkdir -p dist
          
          # 保持原始文件名，只移动到 dist 目录
          find client/release -type f \( -iname "*.exe" -o -iname "*.zip" -o -iname "*.AppImage" \) -print0 | while IFS= read -r -d '' file; do
            filename=$(basename "$file")
            mv "$file" "dist/$filename"
          done

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: dist/*
          retention-days: 14

  release:
    name: 创建 GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 显示 Release 产物
        run: ls -laR artifacts

      - name: 删除已有的 Release（如果存在）
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "删除已有的 Release: ${GITHUB_REF_NAME}"
            gh release delete "${GITHUB_REF_NAME}" --yes
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 创建 GitHub Release（稳定方案）
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            artifacts/**/* \
            --generate-notes \
            --verify-tag \
            --draft=false \
            --prerelease=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}