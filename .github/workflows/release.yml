name: 构建并发布桌面应用

on:
  push:
    tags:
      - 'v*' # 推送符合 v* 格式的标签时触发，例如 v1.0, v20.15.10

permissions:
  contents: write

jobs:
  release:
    name: 在 ${{ matrix.os }} 上构建并发布
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # 当前支持 Windows、macOS 和 Linux
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: 检出 Git 仓库
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc, x86_64-apple-darwin, x86_64-unknown-linux-gnu

      - name: 安装 Rust 依赖（Linux）
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config libssl-dev libudev-dev

      - name: 构建 Rust 后端
        run: cargo build --release
        working-directory: ./rust

      - name: 安装前端依赖
        run: npm ci
        working-directory: ./client

      - name: 同步 package 版本与 git tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version $VERSION --no-git-tag-version
        working-directory: ./client

      - name: 构建 React 和 Electron 应用
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build
        working-directory: ./client

      - name: 发布 Release
        uses: samuelmeuli/action-electron-builder@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          release_draft: false
          package_root: client
          mac_certs: ${{ secrets.MAC_CERTS }}
          mac_certs_password: ${{ secrets.MAC_CERTS_PASSWORD }}
          # 如果提交带有版本标签（例如 "v1.0.0"），
          # 构建完成后发布应用
          release: ${{ startsWith(github.ref, 'refs/tags/v') }}
