name: 构建并发布桌面应用

on:
  push:
    tags:
      - 'v*' # 推送符合 v* 格式的标签时触发，例如 v1.0, v20.15.10

permissions:
  contents: write

jobs:
  build:
    name: 在 ${{ matrix.os }} 上构建
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # 当前支持 Windows、macOS 和 Linux
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: 检出 Git 仓库
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc, x86_64-apple-darwin, x86_64-unknown-linux-gnu

      - name: 安装 Rust 依赖（Linux）
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config libssl-dev libudev-dev

      - name: 构建 Rust 后端
        run: cargo build --release
        working-directory: ./rust

      - name: 安装前端依赖
        run: npm ci
        working-directory: ./client

      - name: 同步 package 版本与 git tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          npm version $VERSION --no-git-tag-version
        working-directory: ./client

      - name: 构建 React 和 Electron 应用
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build
        working-directory: ./client

      - name: 打包 Electron 应用（macOS）
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --publish never
        working-directory: ./client

      - name: 打包 Electron 应用（Windows）
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --win --publish never
        working-directory: ./client

      - name: 打包 Electron 应用（Linux）
        if: matrix.os == 'ubuntu-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --linux --publish never
        working-directory: ./client

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: orange-code-desktop-${{ matrix.os }}
          path: client/release/
          retention-days: 30

  release:
    name: 创建 GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 检出 Git 仓库
        uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: 显示下载的文件
        run: ls -la ./artifacts/

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/**/*.exe
            ./artifacts/**/*.dmg
            ./artifacts/**/*.AppImage
            ./artifacts/**/*.deb
            ./artifacts/**/*.rpm
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
